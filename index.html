<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafetyPulse Montgomery - Public Safety Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js for data visualization -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .navy-bg { background-color: #0a192f; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Loading Overlay -->
    <div id="loader" class="fixed inset-0 navy-bg z-50 flex flex-col items-center justify-center text-white">
        <div class="w-12 h-12 border-4 border-blue-400 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xl font-medium animate-pulse">Fetching Public Safety Intelligence...</p>
    </div>

    <!-- Header -->
    <header class="navy-bg text-white py-8 px-6 shadow-xl border-b border-blue-900/30">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-blue-600 rounded-2xl shadow-lg">
                    <i data-lucide="shield" class="w-8 h-8"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">SafetyPulse Montgomery</h1>
                    <p class="text-blue-300/80 font-medium">Public Safety Intelligence Dashboard</p>
                </div>
            </div>
            <div class="flex items-center gap-3 text-sm bg-slate-800/50 p-3 rounded-xl border border-white/10">
                <i data-lucide="calendar" class="w-4 h-4 text-blue-400"></i>
                <span id="last-updated">Last Updated: --</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-6 max-w-7xl mx-auto w-full space-y-8">
        
        <!-- Stat Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5">
                <div class="p-4 bg-blue-50 rounded-xl"><i data-lucide="phone-call" class="w-8 h-8 text-blue-600"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Total Calls</p>
                    <h3 id="stat-total" class="text-3xl font-bold text-slate-900">--</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5">
                <div class="p-4 bg-emerald-50 rounded-xl"><i data-lucide="activity" class="w-8 h-8 text-emerald-600"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Emergency %</p>
                    <h3 id="stat-percent" class="text-3xl font-bold text-slate-900">--</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-5">
                <div class="p-4 bg-amber-50 rounded-xl"><i data-lucide="trending-up" class="w-8 h-8 text-amber-600"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Busiest Month</p>
                    <h3 id="stat-month" class="text-3xl font-bold text-slate-900">--</h3>
                </div>
            </div>
        </div>

        <!-- Charts -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-6 text-slate-900">2025 Monthly Call Volume</h2>
                <div class="h-[350px]"><canvas id="barChart"></canvas></div>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold mb-6 text-slate-900">Provider Distribution</h2>
                <div class="h-[350px]"><canvas id="pieChart"></canvas></div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://services7.arcgis.com/xNUwUjOJqYE54USz/ArcGIS/rest/services/911_Calls_Data/FeatureServer/0/query?where=1%3D1&outFields=*&f=json&resultRecordCount=2000";

        async function init() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                const features = data.features;

                // Process Stats
                let total = 0, emergency = 0, months = {};
                features.forEach(f => {
                    const attr = f.attributes;
                    const count = attr.Call_Count_By_Origin || 0;
                    total += count;
                    if(attr.Call_Category === 'Emergency') emergency += count;
                    months[attr.Month] = (months[attr.Month] || 0) + count;
                });

                const busiestKey = Object.keys(months).reduce((a, b) => months[a] > months[b] ? a : b);
                const busiestMonthName = busiestKey.split(' - ')[1] || busiestKey;
                
                document.getElementById('stat-total').innerText = total.toLocaleString();
                document.getElementById('stat-percent').innerText = ((emergency/total)*100).toFixed(1) + '%';
                document.getElementById('stat-month').innerText = busiestMonthName;
                document.getElementById('last-updated').innerText = 'Last Updated: ' + new Date().toLocaleDateString();

                // Bar Chart Data (2025)
                const f2025 = features.filter(f => f.attributes.Year === 2025);
                const eMap = {}, nMap = {};
                f2025.forEach(f => {
                    const a = f.attributes;
                    const count = a.Call_Count_By_Origin || 0;
                    if(a.Call_Category === 'Emergency') eMap[a.Month] = (eMap[a.Month] || 0) + count;
                    else nMap[a.Month] = (nMap[a.Month] || 0) + count;
                });

                // Sort months by their prefix (e.g., "01 - January")
                const sortedMonthKeys = Array.from(new Set([...Object.keys(eMap), ...Object.keys(nMap)])).sort();
                const displayLabels = sortedMonthKeys.map(k => k.split(' - ')[1] || k);

                new Chart(document.getElementById('barChart'), {
                    type: 'bar',
                    data: {
                        labels: displayLabels,
                        datasets: [
                            { label: 'Emergency', data: sortedMonthKeys.map(k => eMap[k] || 0), backgroundColor: '#3b82f6', borderRadius: 4 },
                            { label: 'Non-Emergency', data: sortedMonthKeys.map(k => nMap[k] || 0), backgroundColor: '#ef4444', borderRadius: 4 }
                        ]
                    },
                    options: { 
                        responsive: true, 
                        maintainAspectRatio: false,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { precision: 0 }
                            }
                        }
                    }
                });

                // Pie Chart Data
                const providers = {};
                features.forEach(f => {
                    const type = f.attributes.Phone_Service_Provider_Type || 'Unknown';
                    providers[type] = (providers[type] || 0) + (f.attributes.Call_Count_By_Origin || 0);
                });

                new Chart(document.getElementById('pieChart'), {
                    type: 'pie',
                    data: {
                        labels: Object.keys(providers),
                        datasets: [{ data: Object.values(providers), backgroundColor: ['#1e293b', '#3b82f6', '#10b981', '#f59e0b', '#64748b'] }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

                document.getElementById('loader').style.display = 'none';
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                alert("Error loading data. Please check your connection.");
            }
        }
        init();
    </script>
</body>
</html>
